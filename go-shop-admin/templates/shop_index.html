<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Shop</h1>
    <a href="/login">Admin Login</a>
    <table border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price ($)</th>
                <th>View</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.Name}}</td>
                <td>${{dollar .Price}}</td>
                <td><a href="/product/?id={{.ID}}">View</a></td>
            </tr>
            {{else}}
            <tr>
                <td colspan="4">No products found.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</body>
</html>
